platforms:
  claude:
    toolNames:
      read: ["Read", "Glob", "Grep"]
      write: ["Write"]
      edit: ["Edit"]
      bash: ["Bash"]
      search: ["WebSearch", "WebFetch"]
      browser: ["mcp__playwright__navigate", "mcp__playwright__screenshot"]

  opencode:
    defaultModel: anthropic/sonnet
    smallModel: opencode/kimi-k2.5-free
    schema: https://opencode.ai/config.json
    agentNameMap:
      debugger: debug
      devops: devops-engineer
      architect: code-architect

  codex:
    model: gpt-5.4
    modelReasoningEffort: high
    sandbox: elevated
    trustedProjects: {}
    mcpStartupTimeoutSec: 20

  cursor:
    toolNames:
      read: ["read_file", "list_directory", "search_files"]
      write: ["write_file"]
      edit: ["edit_file"]
      bash: ["run_terminal_command"]
      search: ["web_search"]
      browser: ["browser_action"]

  forgecode:
    toolNames:
      read: ["read"]
      write: ["write"]
      edit: ["patch"]
      bash: ["shell"]
      search: ["search", "fetch"]
      browser: ["mcp_*"]
